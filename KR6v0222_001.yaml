body:
  text: 大魏正光五年歲次甲辰七月己酉朔草五日癸酉故蘭倉令孫府君浮圖之銘記君姓孫名遼定州人也綿緒太原分流樂安爵土有因遂居巨鹿焉君稟業沖明惠性天聰少懷淨行長而彌潔悟三有之無常體四趣之沈溺洞達苦空超鑒十相是以童丱之年信心三寶厥齡十八禁酒斷肉修齋持戒心無染縛善能開化方便導物聞其善者欣若己身見其惡者引出火宅又不以支節之痛亦其無我之念遂燒兩指盡身供養至於經行業道之處必捨離親愛敦崇在內託心禪定永樂道場至延昌年中屬皇上宣帝褒蕳舊臣即拜前縣辭不獲免俯仰從任善於治方敷揚恩澤化均魯恭德侔西門名振關左限過將代百姓愛仰率土戀慕若失慈父還京數年仍勤道業將登顯位以彰庸績春秋六十七前件年日寢疾三朝卒於京師權殯此處有子顯就靈鳳子沖等追述亡考精誠之功敬造浮圖一區置於墓所願令事與須彌等壽理與日月齊明永流懿迹式傳不朽乃作銘曰二儀無像四天傳則靈剎開神梵堂啓或伊我君公秉心淵默深覩正真妙達通塞淹回聖迹寢息神光裁辨權實離柝舊章十塵外遣五陰內忘蒸斯沈溺作彼舟航出宿一廛遄臨百里秋蝗遠飛春翬近止清淨未儔蕳率誰擬方覲彌陀遽淪濛汜咨余小子末命將淪構茲寶塔綴此遺塵崇功去劫樹善來因舟壑雖改永播天人
